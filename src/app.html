<!doctype html>
<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(function () {
				try {
					// key must match Persisted key in dark_mode.context.svelte.ts
					var raw = localStorage.getItem('dark_mode');
					var VALID = ['dark', 'light', 'system'];
					var setting = raw ? JSON.parse(raw) : 'system';
					if (!VALID.includes(setting)) setting = 'system';
					var isDark =
						setting === 'dark' ||
						(setting === 'system' &&
							window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (isDark) document.documentElement.classList.add('dark');
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
